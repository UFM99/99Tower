  .bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(10,10,10,0.4) 0%, rgba(10,10,10,0.85) 60%, rgba(10,10,10,0.95) 100%);
    z-index: 1;

  .container {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: linear-gradient(180deg, rgba(20,20,20,0.7) 0%, rgba(10,10,10,0.85) 100%);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 4px;
    padding: 40px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(212,175,55,0.15);
  }
  .header {
    text-align: center;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(212,175,55,0.2);
    margin-bottom: 28px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 900;
    background: linear-gradient(135deg, #d4af37 0%, #f4d03f 50%, #b8860b 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 4px 30px rgba(212,175,55,0.3);
  }
  .divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
    margin: 14px auto;
  }
  h1 {

    font-size: 26px;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 1px;
